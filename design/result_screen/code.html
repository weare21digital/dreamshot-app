<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Royal Portrait Result</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,200..800;1,6..72,200..800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#19194d",
                        "accent-gold": "#d4af37",
                        "background-light": "#f6f6f8",
                        "background-dark": "#14141e",
                    },
                    fontFamily: {
                        "display": ["Newsreader", "serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
<!-- Header -->
<header class="flex items-center justify-between px-4 py-4 sticky top-0 z-10 bg-background-light/80 dark:bg-background-dark/80 backdrop-blur-md border-b border-primary/10">
<button class="size-10 flex items-center justify-center rounded-full hover:bg-primary/5 dark:hover:bg-white/5 transition-colors">
<span class="material-symbols-outlined text-primary dark:text-slate-100">arrow_back_ios_new</span>
</button>
<h1 class="text-xl font-bold tracking-tight text-primary dark:text-slate-100 uppercase">Royal Portrait</h1>
<button class="size-10 flex items-center justify-center rounded-full bg-primary/10 dark:bg-accent-gold/20">
<span class="material-symbols-outlined text-accent-gold">workspace_premium</span>
</button>
</header>
<!-- Main Content: Portrait Display -->
<main class="flex-grow flex flex-col items-center justify-center p-4 @container">
<div class="relative w-full max-w-md aspect-[3/4] rounded-xl overflow-hidden shadow-2xl border-4 border-primary/20 dark:border-accent-gold/30">
<div class="absolute inset-0 bg-center bg-cover" data-alt="Magnificent oil painting style royal portrait with gold frame details" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuCMSyvB_GR5OawfQFQMrJUpwDb6ANKFI7O7erJFmvqn_axA8l-sYCNDfudDwGmLPxwLYXuT3ZYwOBGba3bJE9szHsVJ27W3DTxAnJMBXW_2hM-oaBQBzc-V_Z_w3pasY1AckJ-KJ6yJZbn-azHaejjweAzKE4CxLeOcxC781wy8J0PRLHC9b4i1MAhEQYSOxGdUBmnrmw5hdLuboRtD8lCeWEJWCyjE_k2GLPNpx7u-Jt8r5rfE4-FH_ik2MG8xAwBckadAJRsEvxM');">
</div>
<!-- Overlay for contrast -->
<div class="absolute inset-0 bg-gradient-to-t from-primary/40 to-transparent"></div>
<!-- Floating Style Indicator -->
<div class="absolute bottom-4 left-4 flex items-center gap-2 bg-background-dark/60 backdrop-blur-sm px-3 py-1.5 rounded-full border border-white/20">
<span class="material-symbols-outlined text-accent-gold text-sm">palette</span>
<span class="text-xs font-semibold text-white uppercase tracking-widest">Imperial Gold Style</span>
</div>
</div>
</main>
<!-- Actions Section -->
<section class="px-6 py-4 space-y-4">
<!-- Quick Actions Grid -->
<div class="grid grid-cols-4 gap-4">
<div class="flex flex-col items-center gap-2">
<button class="size-12 rounded-full bg-primary/5 dark:bg-white/5 flex items-center justify-center hover:bg-primary/10 transition-colors">
<span class="material-symbols-outlined text-primary dark:text-slate-100">download</span>
</button>
<span class="text-[10px] font-bold uppercase tracking-tighter opacity-70">Save</span>
</div>
<div class="flex flex-col items-center gap-2">
<button class="size-12 rounded-full bg-primary/5 dark:bg-white/5 flex items-center justify-center hover:bg-primary/10 transition-colors">
<span class="material-symbols-outlined text-primary dark:text-slate-100">share</span>
</button>
<span class="text-[10px] font-bold uppercase tracking-tighter opacity-70">Share</span>
</div>
<div class="flex flex-col items-center gap-2">
<button class="size-12 rounded-full bg-primary/5 dark:bg-white/5 flex items-center justify-center hover:bg-primary/10 transition-colors">
<span class="material-symbols-outlined text-primary dark:text-slate-100">auto_fix_high</span>
</button>
<span class="text-[10px] font-bold uppercase tracking-tighter opacity-70">Enhance</span>
</div>
<div class="flex flex-col items-center gap-2">
<button class="size-12 rounded-full bg-primary/5 dark:bg-white/5 flex items-center justify-center hover:bg-primary/10 transition-colors">
<span class="material-symbols-outlined text-primary dark:text-slate-100">history</span>
</button>
<span class="text-[10px] font-bold uppercase tracking-tighter opacity-70">History</span>
</div>
</div>
<!-- Primary Buttons -->
<div class="flex flex-col gap-3">
<button class="w-full h-14 bg-primary text-white rounded-xl font-bold flex items-center justify-center gap-2 shadow-lg shadow-primary/20 hover:scale-[1.02] active:scale-95 transition-all">
<span class="material-symbols-outlined text-accent-gold">movie</span>
                Generate Video (PRO)
            </button>
<button class="w-full h-14 bg-background-light dark:bg-slate-800 border-2 border-primary/10 dark:border-white/10 text-primary dark:text-slate-100 rounded-xl font-bold flex items-center justify-center gap-2 hover:bg-primary/5 transition-all">
<span class="material-symbols-outlined">brush</span>
                Try Another Style
            </button>
</div>
</section>
<!-- Bottom Nav Bar -->
<nav class="mt-auto border-t border-primary/10 bg-background-light dark:bg-background-dark px-6 py-4 flex items-center justify-between">
<a class="flex flex-col items-center gap-1 text-primary/50 dark:text-slate-400" href="#">
<span class="material-symbols-outlined">home</span>
</a>
<a class="flex flex-col items-center gap-1 text-primary dark:text-accent-gold" href="#">
<span class="material-symbols-outlined font-variation-settings-fill">photo_library</span>
</a>
<a class="flex flex-col items-center gap-1 text-primary/50 dark:text-slate-400" href="#">
<span class="material-symbols-outlined">person</span>
</a>
<a class="flex flex-col items-center gap-1 text-primary/50 dark:text-slate-400" href="#">
<span class="material-symbols-outlined">settings</span>
</a>
</nav>
</body></html>
